name: Release · crates.io

# Publishes honker-core + honker-extension to crates.io when a tag
# matching `core-v*` or `ext-v*` is pushed. Keeps crate versions
# independent so we can ship a point release of one without the other.
#
# Usage:
#   git tag core-v0.1.1 && git push origin core-v0.1.1
#   git tag ext-v0.1.1  && git push origin ext-v0.1.1
#
# Requires repo secret CARGO_REGISTRY_TOKEN (crates.io API token with
# publish scope for the honker-* crates).

on:
  push:
    tags:
      - "core-v*"
      - "ext-v*"
  workflow_dispatch:
    inputs:
      crate:
        description: "Which crate to publish"
        required: true
        type: choice
        options:
          - honker-core
          - honker-extension

# Same source-tree hash pattern as ci.yml. If we're publishing, we
# explicitly want cache hits to match the sources being published.
env:
  RUST_CACHE_KEY_SOURCES: >-
    ${{ hashFiles(
      'honker-core/src/**/*.rs',
      'honker-core/Cargo.toml',
      'honker-extension/src/**/*.rs',
      'honker-extension/Cargo.toml'
    ) }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-src-${{ env.RUST_CACHE_KEY_SOURCES }}"

      - name: Determine crate
        id: crate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.crate }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/core-v* ]]; then
            echo "name=honker-core" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/ext-v* ]]; then
            echo "name=honker-extension" >> $GITHUB_OUTPUT
          else
            echo "Unknown tag pattern: ${{ github.ref }}" >&2
            exit 1
          fi

      - name: Verify test suite before publish
        run: cargo test -p honker-core --release --lib

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p "${{ steps.crate.outputs.name }}"
