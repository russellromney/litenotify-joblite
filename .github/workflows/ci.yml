name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for a branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Drop the default-write GITHUB_TOKEN. Only checkout (contents:read)
# is needed across these jobs. If a job ever needs more, it should
# request it explicitly at the job level.
permissions:
  contents: read

# Swatinem/rust-cache@v2 derives its cache key from Cargo.lock + rustc
# version by default. That's good for dependency bumps but NOT for edits
# to .rs files in our own crates — a source-only change produces the same
# key, which let an older compiled extension stick around under a later
# commit (caused a real CI false-pass once). Hash core + extension source
# trees into each job's prefix-key so any source change invalidates the
# cache. hashFiles() runs after checkout, so the pattern lives per-job
# rather than at workflow-level (where the workspace isn't populated yet).

jobs:
  rust:
    name: rust · honker-core + extension
    timeout-minutes: 8
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-rust-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - name: Run honker-core tests (release)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cargo test -p honker-core --release --lib --features bundled-sqlite
          else
            cargo test -p honker-core --release --lib
          fi
      - name: Run honker-core tests (debug)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cargo test -p honker-core --lib --features bundled-sqlite
          else
            cargo test -p honker-core --lib
          fi
      - name: Build loadable extension
        run: cargo build --release -p honker-extension
      # Windows stock Python ships sqlite without load_extension support.
      # Use python-build-standalone (via setup-python) which has it.
      - name: Sanity-load via Python sqlite3
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sqlite3

          candidates = (
              "target/release/libhonker_ext.dylib",
              "target/release/libhonker_ext.so",
              "target/release/honker_ext.dll",
          )
          ext = None
          for cand in candidates:
              if os.path.exists(cand):
                  ext = os.path.abspath(cand)
                  break
          assert ext, f"extension artifact not found; tried: {candidates}"
          print(f"loading: {ext}")

          conn = sqlite3.connect(":memory:")
          if not hasattr(conn, "enable_load_extension"):
              print("sqlite3.Connection.enable_load_extension unavailable; skipping load test")
              raise SystemExit(0)
          try:
              conn.enable_load_extension(True)
          except sqlite3.NotSupportedError:
              print("sqlite3 was not compiled with load_extension; skipping load test")
              raise SystemExit(0)
          conn.load_extension(ext)
          conn.execute("SELECT honker_bootstrap()")
          conn.commit()

          cur = conn.execute(
              "SELECT honker_cron_next_after('0 3 * * *', 0)"
          ).fetchone()
          assert cur[0] > 0
          print(f"honker_cron_next_after -> {cur[0]}")
          PY

  perf-regression:
    # Run bench/wal_index_methods and assert mmap-shm is meaningfully
    # faster than PRAGMA. The threshold is intentionally loose (50×)
    # — observed delta is ~3000× on real hardware, so anything
    # within 60× of that means something has fundamentally changed.
    # Catches "I removed the cached prepared stmt and now PRAGMA is
    # 5µs/call" or "I broke the mmap reader" — not micro-regressions.
    name: bench · wal_index_methods (regression check)
    if: github.event_name != 'pull_request'
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "bench/wal_index_methods"
          prefix-key: "v1-bench-${{ hashFiles('bench/wal_index_methods/Cargo.toml', 'bench/wal_index_methods/src/**/*.rs') }}"
      - name: Run wal_index_methods bench
        working-directory: bench/wal_index_methods
        run: cargo run --release | tee /tmp/bench.out
      - name: Assert mmap-shm beats cached PRAGMA by ≥50×
        run: |
          set -euo pipefail
          # Output lines look like:
          #   "  shm iChange (safe dual-read + barrier)                             0.6 ns/poll"
          #   "  PRAGMA data_version via cached prepared stmt                    1543.9 ns/poll"
          # Extract the numeric ns/poll value from each.
          SHM=$(awk '/shm iChange \(safe dual-read/ {print $(NF-1)}' /tmp/bench.out)
          PRAGMA=$(awk '/PRAGMA data_version via cached prepared stmt/ {print $(NF-1)}' /tmp/bench.out)
          test -n "$SHM"    || { echo "could not parse shm iChange line"; cat /tmp/bench.out; exit 1; }
          test -n "$PRAGMA" || { echo "could not parse cached PRAGMA line"; cat /tmp/bench.out; exit 1; }
          python3 -c "
          shm = float('$SHM')
          pragma = float('$PRAGMA')
          ratio = pragma / max(shm, 0.01)
          print(f'mmap shm iChange: {shm} ns/poll')
          print(f'cached PRAGMA:    {pragma} ns/poll')
          print(f'ratio:            {ratio:.0f}x')
          assert ratio >= 50, f'mmap-shm should be at least 50x faster than cached PRAGMA, got {ratio:.1f}x'
          "

  python:
    name: python · honker
    timeout-minutes: 5
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(github.event_name == 'pull_request' && '[{"os":"ubuntu-latest","python-version":"3.12"},{"os":"ubuntu-latest","python-version":"3.14"},{"os":"macos-latest","python-version":"3.12"},{"os":"windows-latest","python-version":"3.12"}]' || '[{"os":"ubuntu-latest","python-version":"3.12"},{"os":"ubuntu-latest","python-version":"3.14"},{"os":"macos-latest","python-version":"3.12"},{"os":"macos-latest","python-version":"3.14"},{"os":"windows-latest","python-version":"3.12"},{"os":"windows-latest","python-version":"3.14"}]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Create venv + install
        shell: bash
        run: |
          uv venv --python "${{ matrix.python-version }}" .venv
          if [ "${{ runner.os }}" = "Windows" ]; then
            VENV_PY=.venv/Scripts/python.exe
          else
            VENV_PY=.venv/bin/python
          fi
          uv pip install --python "$VENV_PY" pytest pytest-asyncio pytest-xdist maturin
      - name: Build honker-extension
        run: cargo build --release -p honker-extension
      - name: Build PyO3 _honker_native (maturin develop)
        # The `honker` Python package exposes a PyO3 cdylib named
        # `_honker_native`. setuptools in pyproject.toml only handles
        # the pure-Python files; maturin is what compiles + installs
        # the Rust cdylib into the venv's site-packages.
        working-directory: packages/honker
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            . ../../.venv/Scripts/activate
          else
            . ../../.venv/bin/activate
          fi
          maturin develop --release
      - name: Run pytest
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            . .venv/Scripts/activate
          else
            . .venv/bin/activate
          fi
          # Cross-process wake latency tests are scheduler-sensitive;
          # pytest-xdist adds enough process noise to produce CI-only
          # outliers. Keep the Python job single-process on every OS.
          python -m pytest tests/ -q -n 0 --tb=short

  dotnet:
    name: dotnet · honker-dotnet
    timeout-minutes: 8
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            native_name: libhonker_ext.so
          - os: macos-14
            rid: osx-arm64
            native_name: libhonker_ext.dylib
          - os: windows-latest
            rid: win-x64
            native_name: honker_ext.dll
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml', 'packages/honker-dotnet/src/**/*.cs', 'packages/honker-dotnet/tests/**/*.cs', 'packages/honker-dotnet/**/*.csproj') }}"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build honker-extension
        run: cargo build --release -p honker-extension
      - name: Run .NET binding tests
        run: dotnet test packages/honker-dotnet/tests/Honker.Tests/Honker.Tests.csproj --verbosity normal
      - name: Pack NuGet smoke test
        shell: bash
        run: |
          mkdir -p "packages/honker-dotnet/src/Honker/package-assets/runtimes/${{ matrix.rid }}/native"
          cp "target/release/${{ matrix.native_name }}" "packages/honker-dotnet/src/Honker/package-assets/runtimes/${{ matrix.rid }}/native/${{ matrix.native_name }}"
          dotnet pack packages/honker-dotnet/src/Honker/Honker.csproj -c Release --no-restore -p:PackageVersion=0.0.0-ci.${{ github.run_number }} -o artifacts/honker-dotnet
      - name: Restore and run packaged consumer smoke test
        shell: bash
        run: |
          packages/honker-dotnet/scripts/smoke-consumer.sh artifacts/honker-dotnet

  node:
    name: node · honker-node
    timeout-minutes: 5
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(github.event_name == 'pull_request' && '[{"os":"ubuntu-latest","node-version":"22"},{"os":"ubuntu-latest","node-version":"24"},{"os":"macos-latest","node-version":"22"},{"os":"windows-latest","node-version":"22"}]' || '[{"os":"ubuntu-latest","node-version":"22"},{"os":"ubuntu-latest","node-version":"24"},{"os":"macos-latest","node-version":"22"},{"os":"macos-latest","node-version":"24"},{"os":"windows-latest","node-version":"22"},{"os":"windows-latest","node-version":"24"}]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the node submodule + core crate it path-deps.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # The cross-language Node proof files spawn the venv's Python to
      # verify Python ↔ Node share the same .db. So the node job also
      # needs Python with the honker package + _honker_native cdylib
      # installed.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Create venv + build Python extension
        shell: bash
        run: |
          uv venv --python "3.12" .venv
          if [ "${{ runner.os }}" = "Windows" ]; then
            VENV_PY=.venv/Scripts/python.exe
            ACTIVATE=.venv/Scripts/activate
          else
            VENV_PY=.venv/bin/python
            ACTIVATE=.venv/bin/activate
          fi
          uv pip install --python "$VENV_PY" maturin
          cd packages/honker
          . "../../$ACTIVATE"
          maturin develop --release
      - name: Build .node binary
        working-directory: packages/honker-node
        shell: bash
        run: |
          npm install
          npx napi build --platform --release
      - name: Test (basic — node only)
        working-directory: packages/honker-node
        shell: bash
        run: node --test test/basic.js
      - name: Test (direct proof — python writes, node updateEvents observes)
        working-directory: packages/honker-node
        shell: bash
        run: node --test test/cross_lang_python_to_node.js
      - name: Test (direct proof — node writes, python listens)
        working-directory: packages/honker-node
        shell: bash
        run: node --test test/cross_lang_node_to_python.js
      - name: Test (supporting proof — cross-language shared rows/schema)
        working-directory: packages/honker-node
        shell: bash
        run: node --test test/cross_lang_supporting.js

  binding-smoke:
    name: binding smoke · ubuntu aggregate
    timeout-minutes: 12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-bindings-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml', 'packages/honker/src/**/*.rs', 'packages/honker/Cargo.toml') }}"
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/honker-go/go.mod
      - uses: mlugg/setup-zig@v2
      - uses: oven-sh/setup-bun@v2
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build honker-extension
        run: cargo build --release -p honker-extension
      - name: Build Python binding
        shell: bash
        run: |
          uv venv --python "3.12" .venv
          . .venv/bin/activate
          uv pip install pytest pytest-xdist maturin
          cd packages/honker
          maturin develop --release
      - name: Rust wrapper
        run: cargo test --manifest-path packages/honker-rs/Cargo.toml
      - name: Go
        working-directory: packages/honker-go
        run: go test -tags sqlite_load_extension ./...
      - name: C++
        working-directory: packages/honker-cpp
        run: zig build test -Dhonker-ext="${GITHUB_WORKSPACE}/target/release/libhonker_ext.so"
      - name: Bun
        working-directory: packages/honker-bun
        run: |
          bun install --frozen-lockfile
          bun test
      - name: Ruby
        working-directory: packages/honker-ruby
        run: |
          bundle install
          bundle exec ruby -Ilib spec/honker_spec.rb
          bundle exec ruby -Ilib spec/smoke_spec.rb
          bundle exec ruby -Ilib spec/parity_spec.rb
      - name: Elixir
        working-directory: packages/honker-ex
        run: |
          mix deps.get
          mix test
      - name: Run Ruby ↔ Python interop
        shell: bash
        run: |
          . .venv/bin/activate
          python -m pytest tests/test_ruby_python_interop.py -q --tb=short
