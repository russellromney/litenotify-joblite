name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for a branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Swatinem/rust-cache@v2 derives its cache key from Cargo.lock + rustc
# version by default. That's good for dependency bumps but NOT for edits
# to .rs files in our own crates — a source-only change produces the same
# key, which let an older compiled extension stick around under a later
# commit (caused a real CI false-pass once). Hash core + extension source
# trees into each job's prefix-key so any source change invalidates the
# cache. hashFiles() runs after checkout, so the pattern lives per-job
# rather than at workflow-level (where the workspace isn't populated yet).

jobs:
  rust-core:
    name: rust · honker-core (lib tests)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - run: cargo test -p honker-core --release --lib

  rust-extension:
    name: rust · honker-extension (build)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - name: Build loadable extension
        run: cargo build --release -p honker-extension
      - name: Sanity-load via Python sqlite3
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import sqlite3

          ext = None
          for cand in (
              "target/release/libhonker_ext.dylib",
              "target/release/libhonker_ext.so",
          ):
              if os.path.exists(cand):
                  ext = cand
                  break
          assert ext, "extension artifact not found"

          conn = sqlite3.connect(":memory:")
          conn.enable_load_extension(True)
          conn.load_extension(ext)
          conn.execute("SELECT honker_bootstrap()")
          conn.commit()

          cur = conn.execute(
              "SELECT honker_cron_next_after('0 3 * * *', 0)"
          ).fetchone()
          assert cur[0] > 0
          print(f"honker_cron_next_after → {cur[0]}")
          PY

  python:
    name: python · honker
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps (uv)
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Create venv + install
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install pytest pytest-asyncio pytest-xdist maturin
      - name: Build honker-extension
        run: cargo build --release -p honker-extension
      - name: Build PyO3 _honker_native (maturin develop)
        # The `honker` Python package exposes a PyO3 cdylib named
        # `_honker_native`. setuptools in pyproject.toml only handles
        # the pure-Python files; maturin is what compiles + installs
        # the Rust cdylib into the venv's site-packages.
        working-directory: packages/honker
        run: |
          . ../../.venv/bin/activate
          maturin develop --release
      - name: Run pytest
        run: |
          . .venv/bin/activate
          # macOS runners deadlock under pytest-xdist with the WAL watcher
          # thread (sqlite3 + PyO3 + process forking). Force single-process.
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            python -m pytest tests/ -q -n 1 --tb=short
          else
            python -m pytest tests/ -q --tb=short
          fi

  node:
    name: node · honker-node
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the node submodule + core crate it path-deps.
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-src-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml', 'honker-extension/src/**/*.rs', 'honker-extension/Cargo.toml') }}"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # cross_lang.js spawns `.venv/bin/python` to verify Python ↔ Node
      # share the same .db. So the node job also needs Python with the
      # honker package + _honker_native cdylib installed.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv + maturin
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Create venv + build Python extension
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install maturin
          cd packages/honker
          maturin develop --release
      - name: Build .node binary
        working-directory: packages/honker-node
        run: |
          npm install
          npx napi build --platform --release
      - name: Test
        working-directory: packages/honker-node
        run: npm test
