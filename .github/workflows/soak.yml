name: Soak

# Long-running durability test. Runs the watcher + a committer for
# an hour, asserts the database is intact and the watcher saw the
# expected number of changes. Catches resource leaks (file
# descriptors, threads, memory) and "the watcher silently stopped"
# regressions that PR CI is too short to expose.
#
# Schedule: nightly at 09:00 UTC (off-peak for North American
# contributors). Also runnable on demand via workflow_dispatch.

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      duration_secs:
        description: "Soak duration in seconds"
        required: false
        default: "3600"

jobs:
  soak:
    name: soak · update_watcher (1 hour by default)
    runs-on: ubuntu-latest
    # 80 minutes — 60 min default soak + 20 min margin for compile,
    # cleanup, slow runner cold-start, etc.
    timeout-minutes: 80
    env:
      HONKER_SOAK_DURATION_SECS: ${{ github.event.inputs.duration_secs || '3600' }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          prefix-key: "v1-soak-${{ hashFiles('honker-core/src/**/*.rs', 'honker-core/Cargo.toml') }}"
      - name: Run soak
        run: |
          echo "Soak duration: $HONKER_SOAK_DURATION_SECS seconds"
          cargo test -p honker-core --release --lib soak_watcher_durability -- --ignored --test-threads=1 --nocapture
