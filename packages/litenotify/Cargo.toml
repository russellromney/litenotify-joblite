[package]
name = "litenotify"
version = "0.1.0"
edition = "2024"

[lib]
name = "litenotify"
crate-type = ["cdylib"]

[dependencies]
honker-core = { path = "../../honker-core" }
parking_lot = "0.12.5"
pyo3 = { version = "0.28.3", features = ["extension-module"] }
rusqlite = { version = "0.39.0", features = ["functions", "hooks"] }
