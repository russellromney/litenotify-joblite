[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "joblite-flask"
version = "0.1.0"
description = "Flask integration for joblite: SSE endpoints, flask joblite_worker CLI, authorize hook."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Russell Romney" }]
keywords = ["sqlite", "flask", "queue", "sse", "joblite"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: Flask",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "joblite>=0.1.0",
  "flask>=3.0",
  "click>=8.0",
]

[project.urls]
Homepage = "https://github.com/russellromney/litenotify-joblite"

[tool.setuptools]
packages = ["joblite_flask"]
package-dir = { "joblite_flask" = "." }
