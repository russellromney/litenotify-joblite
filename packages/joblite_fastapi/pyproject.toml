[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "joblite-fastapi"
version = "0.1.0"
description = "FastAPI integration for joblite: worker pool, SSE endpoints, authorize hook."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Russell Romney" }]
keywords = ["sqlite", "fastapi", "queue", "sse", "joblite"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: FastAPI",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "joblite>=0.1.0",
  "fastapi>=0.110",
]

[project.urls]
Homepage = "https://github.com/russellromney/litenotify-joblite"

[tool.setuptools]
packages = ["joblite_fastapi"]
package-dir = { "joblite_fastapi" = "." }
