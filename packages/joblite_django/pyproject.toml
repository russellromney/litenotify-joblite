[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "joblite-django"
version = "0.1.0"
description = "Django integration for joblite: @task registry, async SSE views, management-command worker runner."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Russell Romney" }]
keywords = ["sqlite", "django", "queue", "sse", "joblite"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Framework :: Django",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
]
dependencies = [
  "joblite>=0.1.0",
  "django>=4.1",
]

[project.urls]
Homepage = "https://github.com/russellromney/litenotify-joblite"

[tool.setuptools]
packages = [
  "joblite_django",
  "joblite_django.management",
  "joblite_django.management.commands",
]
package-dir = { "joblite_django" = "." }
