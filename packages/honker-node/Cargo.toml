[package]
name = "honker-node"
version = "0.1.1"
edition = "2024"

# Not part of the root workspace — lives on its own so it can be
# split into a submodule repo without disturbing the core build.
[workspace]

[lib]
name = "honker_node"
crate-type = ["cdylib"]

[features]
# Forward to honker-core. Enable at build time with
# `npm run build -- --features kernel-watcher`. Wheels built without
# these features silently fall back to polling when a JS caller passes
# `watcherBackend: "kernel"` or `"shm"`.
kernel-watcher = ["honker-core/kernel-watcher"]
shm-fast-path = ["honker-core/shm-fast-path"]

[dependencies]
# Relative path works when this crate sits at packages/honker-node
# inside the main honker repo (whether directly or as a submodule).
# Standalone hacking on this repo alone requires honker-core on
# crates.io (future) or a manual path override in .cargo/config.toml.
honker-core = { path = "../../honker-core", version = "0.2.2" }
napi = { version = "3.2", features = ["async", "serde-json", "tokio_rt"] }
napi-derive = "3.2"
parking_lot = "0.12.5"
rusqlite = { version = "0.39.0", features = ["functions", "hooks"] }
serde_json = "1.0"
tokio = { version = "1.52.1", features = ["rt", "rt-multi-thread"] }

[target.'cfg(windows)'.dependencies]
honker-core = { path = "../../honker-core", version = "0.2.2", features = ["bundled-sqlite"] }

[build-dependencies]
napi-build = "2.2"

[profile.release]
lto = true
